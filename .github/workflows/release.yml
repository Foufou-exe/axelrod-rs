name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'Cargo.toml'
  # Also allow manual trigger and tag-based trigger
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (without v prefix)'
        required: false
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # First, check if version changed (only for main branch push)
  check-version:
    name: Check Version Change
    runs-on: ubuntu-latest
    # Skip this job if triggered by tag
    if: github.ref_type != 'tag'
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.current.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get current version
        id: current
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Get previous version
        id: previous
        run: |
          git show HEAD~1:Cargo.toml > /tmp/prev_cargo.toml 2>/dev/null || echo 'version = "0.0.0"' > /tmp/prev_cargo.toml
          PREV_VERSION=$(grep '^version' /tmp/prev_cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "Previous version: $PREV_VERSION"

      - name: Check if should release
        id: check
        run: |
          CURRENT="${{ steps.current.outputs.version }}"
          PREVIOUS="${{ steps.previous.outputs.version }}"
          
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            # Check if tag already exists
            if git ls-remote --tags origin | grep -q "refs/tags/v${CURRENT}$"; then
              echo "Tag v${CURRENT} already exists, skipping release"
              echo "should_release=false" >> $GITHUB_OUTPUT
            else
              echo "Version changed from $PREVIOUS to $CURRENT, will release"
              echo "should_release=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Version unchanged"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  # Build for all platforms
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [check-version]
    # Run if: tag push OR version changed OR manual dispatch
    if: |
      always() && 
      (github.ref_type == 'tag' || 
       needs.check-version.outputs.should_release == 'true' ||
       github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: axelrod-rs
            asset_name: axelrod-rs-linux-x86_64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: axelrod-rs.exe
            asset_name: axelrod-rs-windows-x86_64.exe

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: axelrod-rs
            asset_name: axelrod-rs-macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: axelrod-rs
            asset_name: axelrod-rs-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  # Create the release
  release:
    name: Create Release
    needs: [check-version, build]
    if: |
      always() && 
      needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.ref_type }}" == "tag" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${{ needs.check-version.outputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Create tag if needed
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if ! git ls-remote --tags origin | grep -q "refs/tags/v${VERSION}$"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "v${VERSION}" -m "Release v${VERSION}"
            git push origin "v${VERSION}"
            echo "Created tag v${VERSION}"
          else
            echo "Tag v${VERSION} already exists"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Linux
          cp artifacts/axelrod-rs-linux-x86_64/axelrod-rs release/axelrod-rs-linux-x86_64
          chmod +x release/axelrod-rs-linux-x86_64
          # Windows
          cp artifacts/axelrod-rs-windows-x86_64.exe/axelrod-rs.exe release/axelrod-rs-windows-x86_64.exe
          # macOS x86_64
          cp artifacts/axelrod-rs-macos-x86_64/axelrod-rs release/axelrod-rs-macos-x86_64
          chmod +x release/axelrod-rs-macos-x86_64
          # macOS ARM64
          cp artifacts/axelrod-rs-macos-aarch64/axelrod-rs release/axelrod-rs-macos-aarch64
          chmod +x release/axelrod-rs-macos-aarch64

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Extract changelog for this version (if exists)
          if [ -f CHANGELOG.md ]; then
            sed -n "/^## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1 > release_notes.md
            if [ ! -s release_notes.md ]; then
              echo "Release v$VERSION" > release_notes.md
            fi
          else
            echo "Release v$VERSION" > release_notes.md
          fi
          cat release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            release/axelrod-rs-linux-x86_64
            release/axelrod-rs-windows-x86_64.exe
            release/axelrod-rs-macos-x86_64
            release/axelrod-rs-macos-aarch64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUBE_TOKEN }}
