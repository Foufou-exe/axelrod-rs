# SonarQube/SonarCloud Configuration for axelrod-rs
# Rust support available since SonarQube Server 2025 Release 3 / SonarCloud April 2025

sonar.projectKey=Foufou-exe_axelrod-rs
sonar.organization=foufou-exe

# Project metadata
sonar.projectName=axelrod-rs
sonar.projectVersion=0.3.0

# Source configuration
sonar.sources=src
sonar.sourceEncoding=UTF-8
# Note: No separate tests folder - Rust tests are inline in src/

# Rust-specific configuration
# SonarQube uses Clippy for Rust analysis - ensure Clippy is installed on the CI runner
sonar.rust.clippy.reportPaths=clippy-report.json

# Coverage report (LCOV format from cargo-llvm-cov)
sonar.rust.lcov.reportPaths=lcov.info

# Exclusions
sonar.exclusions=**/target/**,**/examples/**,**/*.md,**/build-wrapper-dump.json
sonar.test.exclusions=**/target/**

# Additional settings
sonar.links.homepage=https://github.com/foufou-exe/axelrod-rs
sonar.links.ci=https://github.com/foufou-exe/axelrod-rs/actions
sonar.links.scm=https://github.com/foufou-exe/axelrod-rs
sonar.links.issue=https://github.com/foufou-exe/axelrod-rs/issues
